<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smart Infusion Pump - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#313030",
                        "primary-container": "#424242",
                        "outline": "#747878",
                        "on-secondary-container": "#646464",
                        "on-surface": "#1c1b1b",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "secondary-container": "#e3e2e2",
                        "surface-bright": "#fdf8f8",
                        "outline-variant": "#c4c7c7",
                        "surface-container-high": "#ebe7e7",
                        "on-tertiary-fixed": "#1e1b1b",
                        "secondary-fixed": "#e3e2e2",
                        "error-container": "#ffdad6",
                        "tertiary": "#2f2b2b",
                        "surface": "#fdf8f8",
                        "surface-container": "#f1edec",
                        "on-primary-fixed-variant": "#474747",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "primary": "#2c2c2c",
                        "surface-variant": "#e5e2e1",
                        "tertiary-container": "#454141",
                        "tertiary-fixed": "#e8e1e0",
                        "secondary-fixed-dim": "#c7c6c6",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "on-primary-container": "#b0aeae",
                        "on-primary-fixed": "#1b1c1c",
                        "background": "#fdf8f8",
                        "tertiary-fixed-dim": "#ccc5c5",
                        "surface-container-low": "#f7f3f2",
                        "surface-dim": "#ddd9d8",
                        "on-tertiary-container": "#b3adad",
                        "on-background": "#1c1b1b",
                        "on-secondary": "#ffffff",
                        "secondary": "#5e5e5e",
                        "inverse-primary": "#c8c6c6",
                        "primary-fixed": "#e4e2e1",
                        "surface-container-highest": "#e5e2e1",
                        "surface-tint": "#5f5e5e",
                        "on-tertiary-fixed-variant": "#4a4646",
                        "on-secondary-fixed": "#1b1c1c",
                        "inverse-on-surface": "#f4f0ef",
                        "primary-fixed-dim": "#c8c6c6",
                        "on-surface-variant": "#444748",
                        "on-secondary-fixed-variant": "#464747"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4pt",
                        "md": "16pt",
                        "xl": "32pt",
                        "margin": "24pt",
                        "lg": "24pt",
                        "gutter": "16pt",
                        "sm": "8pt"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "title": ["Inter"],
                        "body": ["Inter"],
                        "caption": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["11pt", { "lineHeight": "14pt", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "title": ["20pt", { "lineHeight": "28pt", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body": ["16pt", { "lineHeight": "24pt", "letterSpacing": "0", "fontWeight": "400" }],
                        "caption": ["13pt", { "lineHeight": "18pt", "letterSpacing": "0.02em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom focus style based on exact brand guidance */
        .input-focus-info:focus {
            outline: none;
            border-color: #039BE5;
            box-shadow: 0 0 0 1px #039BE5;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-md font-body text-body text-on-surface antialiased">
<!-- Login Container -->
<main class="w-full max-w-[420px] bg-surface-container-lowest rounded-xl border border-outline-variant shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-xl flex flex-col gap-lg">
<!-- Top Section: Logo & Title -->
<header class="flex flex-col items-center text-center gap-sm">
<div class="w-[64px] h-[64px] bg-primary text-on-primary rounded-full flex items-center justify-center mb-sm shadow-sm">
<span class="material-symbols-outlined text-[32px]">vaccines</span>
</div>
<h1 class="font-title text-title text-on-surface">Smart Infusion Pump</h1>
<p class="font-caption text-caption text-on-surface-variant">Smart Infusion Simulator</p>
</header>
<!-- Error State Banner -->
<div class="bg-error-container text-on-error-container rounded-lg p-md flex items-start gap-sm border border-[#ffb4ab]">
<span class="material-symbols-outlined mt-[2px]">error</span>
<span class="font-caption text-caption">Invalid credentials. Please try again.</span>
</div>
<!-- Middle Section: Form Fields -->
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- User ID Field -->
<div class="flex flex-col gap-xs">
<label class="font-caption text-caption text-on-surface-variant ml-[2px]" for="userId">User ID</label>
<input class="h-[44px] w-full px-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body text-body text-on-surface placeholder:text-outline-variant input-focus-info transition-colors" id="userId" placeholder="User ID" type="text"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-caption text-caption text-on-surface-variant ml-[2px]" for="password">Password</label>
<div class="relative w-full">
<input class="h-[44px] w-full pl-md pr-[44px] bg-surface-container-lowest border border-outline-variant rounded-lg font-body text-body text-on-surface placeholder:text-outline-variant input-focus-info transition-colors" id="password" placeholder="••••••••" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-0 top-0 h-[44px] w-[44px] flex items-center justify-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Biometric Login Button -->
<button class="mt-sm h-[44px] w-full flex items-center justify-center gap-sm bg-surface-container-lowest border border-outline-variant rounded-xl font-body text-body text-on-surface hover:bg-surface-container-low transition-colors active:scale-[0.98]" type="button">
<span class="material-symbols-outlined text-[20px]">fingerprint</span>
                Sign in with biometrics
            </button>
</form>
<!-- Bottom Section: Actions -->
<footer class="mt-xs">
<button class="h-[56px] w-full bg-primary-container text-on-primary font-title text-title rounded-xl hover:bg-tertiary transition-colors active:scale-[0.98] shadow-sm flex items-center justify-center" type="button">
                Log in
            </button>
</footer>
</main>
</body></html>
