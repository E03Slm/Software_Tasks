<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smart Infusion - Login</title>

                        "critical-red": "#D32F2F",

                        "on-secondary-fixed-variant": "#2d3c9c",

                    "borderRadius": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body-lg text-body-lg min-h-screen flex flex-col justify-center items-center p-margin-edge">
<div class="w-full max-w-md flex flex-col gap-stack-lg">
<div class="flex flex-col items-center justify-center gap-stack-sm mb-stack-lg">
<div class="bg-primary text-on-primary p-3 rounded-full flex items-center justify-center h-16 w-16 mb-2">
<span class="material-symbols-outlined text-4xl" data-icon="medical_services">medical_services</span>
</div>
<h1 class="font-metric-lg text-metric-lg text-text-high-contrast text-center tracking-tight">SMART INFUSION</h1>
<p class="font-helper-text text-helper-text text-outline text-center uppercase tracking-widest">Clinical Authentication</p>
</div>
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl p-stack-lg shadow-sm w-full flex flex-col gap-stack-md">
<div class="flex flex-col gap-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface" for="userId">User ID</label>
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined" data-icon="badge">badge</span>
</div>
<input class="w-full h-input-height pl-12 pr-4 bg-surface-container-highest border border-outline-variant text-on-surface rounded-DEFAULT focus:ring-2 focus:ring-primary focus:border-primary font-body-lg text-body-lg placeholder-outline" id="userId" placeholder="Enter clinical ID" type="text"/>
</div>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface" for="password">Password</label>
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
</div>
<input class="w-full h-input-height pl-12 pr-4 bg-surface-container-highest border border-outline-variant text-on-surface rounded-DEFAULT focus:ring-2 focus:ring-primary focus:border-primary font-body-lg text-body-lg placeholder-outline" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full h-input-height bg-primary text-on-primary font-label-bold text-label-bold rounded-DEFAULT flex justify-center items-center mt-stack-sm hover:bg-surface-tint active:bg-on-primary-fixed-variant transition-colors min-h-[48px]">
                LOGIN
            </button>
<div class="flex items-center gap-4 my-2">
<div class="flex-grow border-t border-surface-variant"></div>
<span class="font-helper-text text-helper-text text-outline uppercase">OR</span>
<div class="flex-grow border-t border-surface-variant"></div>
</div>
<button class="w-full h-input-height bg-surface-container-lowest border-2 border-outline-variant text-on-surface font-label-bold text-label-bold rounded-DEFAULT flex justify-center items-center gap-2 hover:bg-surface-container transition-colors min-h-[48px]">
<span class="material-symbols-outlined" data-icon="fingerprint">fingerprint</span>
                BIOMETRIC LOGIN
            </button>
</div>
<div class="mt-stack-lg flex justify-center">
<p class="font-helper-text text-helper-text text-outline text-center max-w-xs">
                Authorized clinical personnel only. System access is monitored and logged.
            </p>
</div>
</div>
</body></html>
