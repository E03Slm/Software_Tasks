<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Doctor Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-background": "#171d1b",
                    "surface-tint": "#006b5f",
                    "surface-container-high": "#e4e9e7",
                    "on-secondary": "#ffffff",
                    "secondary-container": "#8a99fe",
                    "on-tertiary-fixed": "#071e27",
                    "on-secondary-fixed": "#000d5f",
                    "surface-container": "#eaefec",
                    "on-primary-container": "#f4fffb",
                    "error": "#ba1a1a",
                    "on-primary-fixed": "#00201c",
                    "secondary-fixed-dim": "#bbc3ff",
                    "on-surface": "#171d1b",
                    "primary-container": "#008376",
                    "surface-container-highest": "#dfe4e1",
                    "success-green": "#2E7D32",
                    "primary": "#00685d",
                    "doctor-primary": "#303F9F",
                    "surface-container-low": "#f0f5f2",
                    "surface-neutral": "#F5F5F5",
                    "tertiary": "#4a5f69",
                    "surface-bright": "#f6faf8",
                    "inverse-surface": "#2c3130",
                    "on-tertiary-container": "#fbfdff",
                    "on-primary": "#ffffff",
                    "surface": "#f6faf8",
                    "nurse-primary": "#00897B",
                    "on-tertiary": "#ffffff",
                    "critical-red": "#D32F2F",
                    "secondary": "#4755b6",
                    "text-high-contrast": "#212121",
                    "on-secondary-fixed-variant": "#2d3c9c",
                    "outline-variant": "#bcc9c5",
                    "surface-variant": "#dfe4e1",
                    "on-error": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed-variant": "#005048",
                    "error-container": "#ffdad6",
                    "admin-primary": "#455A64",
                    "background": "#f6faf8",
                    "hard-limit-bg": "#FFEBEE",
                    "on-secondary-container": "#1b2b8c",
                    "primary-fixed-dim": "#70d8c8",
                    "inverse-primary": "#70d8c8",
                    "outline": "#6d7a77",
                    "on-error-container": "#93000a",
                    "tertiary-container": "#627882",
                    "on-surface-variant": "#3d4946",
                    "surface-dim": "#d6dbd9",
                    "inverse-on-surface": "#edf2ef",
                    "on-tertiary-fixed-variant": "#354a53",
                    "tertiary-fixed-dim": "#b4cad6",
                    "primary-fixed": "#8df5e4",
                    "soft-limit-bg": "#FFF8E1",
                    "tertiary-fixed": "#cfe6f2",
                    "secondary-fixed": "#dfe0ff",
                    "warning-amber": "#FFB300"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "margin-edge": "20px",
                    "stack-sm": "8px",
                    "touch-target-min": "48px",
                    "stack-lg": "24px",
                    "stack-md": "16px",
                    "input-height": "56px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "metric-xl": [
                            "Inter"
                    ],
                    "helper-text": [
                            "Inter"
                    ],
                    "headline-md": [
                            "Inter"
                    ],
                    "label-bold": [
                            "Inter"
                    ],
                    "body-lg": [
                            "Inter"
                    ],
                    "metric-lg": [
                            "Inter"
                    ]
            },
            "fontSize": {
                    "metric-xl": [
                            "48px",
                            {
                                    "lineHeight": "56px",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "700"
                            }
                    ],
                    "helper-text": [
                            "12px",
                            {
                                    "lineHeight": "16px",
                                    "fontWeight": "400"
                            }
                    ],
                    "headline-md": [
                            "20px",
                            {
                                    "lineHeight": "28px",
                                    "fontWeight": "600"
                            }
                    ],
                    "label-bold": [
                            "14px",
                            {
                                    "lineHeight": "20px",
                                    "fontWeight": "700"
                            }
                    ],
                    "body-lg": [
                            "16px",
                            {
                                    "lineHeight": "24px",
                                    "fontWeight": "400"
                            }
                    ],
                    "metric-lg": [
                            "32px",
                            {
                                    "lineHeight": "40px",
                                    "fontWeight": "600"
                            }
                    ]
            }
    },
        },
      }
    </script>
<style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-lg text-body-lg antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-5 h-16 bg-slate-50 border-b-2 border-slate-200 flat no shadows">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#00897B]">medical_services</span>
<span class="text-lg font-black text-slate-900 flex items-center gap-2">SMART INFUSION</span>
</div>
<div class="flex items-center gap-4">
<span class="bg-nurse-primary text-on-primary px-3 py-1 rounded-full font-label-bold text-label-bold">DOCTOR</span>
<button class="text-slate-500 hover:bg-slate-100 transition-colors p-2 rounded-full">
<span class="material-symbols-outlined">logout</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-[80px] pb-[100px] px-margin-edge min-h-screen">
<div class="max-w-7xl mx-auto space-y-stack-lg">
<!-- Page Header -->
<div class="flex justify-between items-end pb-stack-sm border-b border-surface-variant">
<div>
<h1 class="font-headline-md text-headline-md text-text-high-contrast">Clinical Overview</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-1">System Status &amp; Alerts</p>
</div>
</div>
<!-- Bento Grid Summary Cards -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-gutter">
<!-- Card 1: Total Drugs -->
<div class="bg-surface-container-lowest border border-surface-variant rounded-lg p-stack-md flex flex-col justify-between h-32 relative overflow-hidden">
<div class="flex justify-between items-start z-10">
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wide">Total Drugs</span>
<span class="material-symbols-outlined text-nurse-primary">vaccines</span>
</div>
<div class="font-metric-xl text-metric-xl text-text-high-contrast z-10">42</div>
<div class="absolute bottom-0 right-0 w-24 h-24 bg-primary-fixed-dim rounded-full blur-2xl opacity-20 translate-x-1/2 translate-y-1/4"></div>
</div>
<!-- Card 2: Recent Alarms -->
<div class="bg-surface-container-lowest border border-error rounded-lg p-stack-md flex flex-col justify-between h-32 relative overflow-hidden shadow-sm">
<div class="flex justify-between items-start z-10">
<span class="font-label-bold text-label-bold text-error uppercase tracking-wide">Recent Alarms</span>
<span class="material-symbols-outlined text-error">warning</span>
</div>
<div class="font-metric-xl text-metric-xl text-error z-10">3</div>
<div class="absolute bottom-0 right-0 w-24 h-24 bg-error-container rounded-full blur-2xl opacity-30 translate-x-1/2 translate-y-1/4"></div>
</div>
<!-- Card 3: Pending Alerts -->
<div class="bg-surface-container-lowest border border-warning-amber rounded-lg p-stack-md flex flex-col justify-between h-32 relative overflow-hidden">
<div class="flex justify-between items-start z-10">
<span class="font-label-bold text-label-bold text-warning-amber uppercase tracking-wide">Pending Alerts</span>
<span class="material-symbols-outlined text-warning-amber">notifications_active</span>
</div>
<div class="font-metric-xl text-metric-xl text-text-high-contrast z-10">1</div>
<div class="absolute bottom-0 right-0 w-24 h-24 bg-warning-amber rounded-full blur-2xl opacity-10 translate-x-1/2 translate-y-1/4"></div>
</div>
</div>
<!-- Quick Actions Grid -->
<div class="grid grid-cols-1 sm:grid-cols-3 gap-gutter mt-stack-lg">
<button class="bg-nurse-primary hover:bg-surface-tint text-on-primary h-touch-target-min rounded-lg font-label-bold text-label-bold flex items-center justify-center gap-2 transition-colors shadow-sm">
<span class="material-symbols-outlined">add_circle</span>
                    Add New Drug
                </button>
<button class="bg-surface-container-lowest border-2 border-outline hover:bg-surface-container-low text-on-surface h-touch-target-min rounded-lg font-label-bold text-label-bold flex items-center justify-center gap-2 transition-colors">
<span class="material-symbols-outlined">history</span>
                    View Logs
                </button>
<button class="bg-surface-container-lowest border-2 border-outline hover:bg-surface-container-low text-on-surface h-touch-target-min rounded-lg font-label-bold text-label-bold flex items-center justify-center gap-2 transition-colors">
<span class="material-symbols-outlined">summarize</span>
                    Generate Report
                </button>
</div>
<!-- Data Visualization Area (Placeholder for clinical look) -->
<div class="bg-surface-container-lowest border border-surface-variant rounded-lg p-stack-md mt-stack-lg min-h-[300px]">
<div class="flex items-center gap-2 mb-stack-md">
<span class="material-symbols-outlined text-tertiary">analytics</span>
<h2 class="font-headline-md text-headline-md text-text-high-contrast">System Utilization</h2>
</div>
<!-- Abstract clinical graph representation -->
<div class="w-full h-[200px] bg-surface-neutral rounded flex items-end justify-around p-4 relative overflow-hidden">
<div class="w-1/6 bg-nurse-primary/20 h-1/3 rounded-t relative"><div class="absolute bottom-full mb-1 w-full text-center font-helper-text text-helper-text text-on-surface-variant">Mon</div></div>
<div class="w-1/6 bg-nurse-primary/40 h-1/2 rounded-t relative"><div class="absolute bottom-full mb-1 w-full text-center font-helper-text text-helper-text text-on-surface-variant">Tue</div></div>
<div class="w-1/6 bg-error/30 h-3/4 rounded-t relative border-t-2 border-error"><div class="absolute bottom-full mb-1 w-full text-center font-helper-text text-helper-text text-error">Wed</div></div>
<div class="w-1/6 bg-nurse-primary/60 h-2/3 rounded-t relative"><div class="absolute bottom-full mb-1 w-full text-center font-helper-text text-helper-text text-on-surface-variant">Thu</div></div>
<div class="w-1/6 bg-nurse-primary h-[80%] rounded-t relative"><div class="absolute bottom-full mb-1 w-full text-center font-helper-text text-helper-text text-on-surface-variant">Fri</div></div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 h-20 pb-safe bg-white border-t-2 border-slate-200 rounded-t-none shadow-none md:hidden">
<button class="flex flex-col items-center justify-center bg-slate-100 text-[#00897B] rounded-md p-2 hover:bg-slate-50 Active: scale-95 duration-75">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">Dashboard</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 p-2 hover:bg-slate-50 Active: scale-95 duration-75">
<span class="material-symbols-outlined">local_hospital</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">Drug Lib</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 p-2 hover:bg-slate-50 Active: scale-95 duration-75">
<span class="material-symbols-outlined">history</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">Logs</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 p-2 hover:bg-slate-50 Active: scale-95 duration-75">
<span class="material-symbols-outlined">description</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">Reports</span>
</button>
</nav>
</body></html>
