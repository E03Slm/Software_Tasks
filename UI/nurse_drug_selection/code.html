<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Drug Selection - Smart Infusion</title>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen pb-safe">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-5 h-16 bg-slate-50 border-b-2 border-slate-200 flat no shadows">
<div class="flex items-center gap-stack-md">
<span class="material-symbols-outlined text-[#00897B] cursor-pointer hover:bg-slate-100 transition-colors rounded-full p-2" data-icon="medical_services">medical_services</span>
<span class="font-['Inter'] font-bold tracking-tighter text-sm uppercase text-slate-900 flex items-center gap-2">SMART INFUSION</span>
</div>
<div class="flex items-center gap-stack-lg">
<!-- Role Badge -->
<div class="flex items-center bg-nurse-primary text-on-primary px-3 py-1 rounded-full text-label-bold font-label-bold">
                NURSE
            </div>
<button aria-label="Logout" class="flex items-center justify-center min-w-touch-target-min min-h-touch-target-min text-[#00897B] hover:bg-slate-100 transition-colors rounded-full">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 px-margin-edge pb-[100px] max-w-3xl mx-auto">
<div class="mb-stack-lg">
<h1 class="text-headline-md font-headline-md text-text-high-contrast mb-stack-sm">DRUG SELECTION</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant">Search or select a medication from the library to configure the infusion pump.</p>
</div>
<!-- Search Bar -->
<div class="relative mb-stack-lg">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="search">search</span>
</div>
<input class="block w-full pl-12 pr-4 h-input-height bg-surface-container-lowest border-2 border-surface-variant rounded-DEFAULT text-body-lg font-body-lg text-on-surface placeholder-on-surface-variant focus:outline-none focus:border-nurse-primary focus:ring-1 focus:ring-nurse-primary transition-colors" placeholder="Search medication (e.g. Dopamine)" type="text"/>
<div class="absolute inset-y-0 right-0 pr-2 flex items-center">
<button aria-label="Clear search" class="p-2 text-outline hover:text-nurse-primary transition-colors rounded-full">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
</div>
<!-- Drug List Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Drug Card 1 -->
<button class="flex flex-col text-left bg-surface-container-lowest border-2 border-surface-variant hover:border-nurse-primary rounded-lg p-stack-md transition-all active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-nurse-primary focus:ring-offset-2 focus:ring-offset-background">
<div class="flex justify-between items-start w-full mb-stack-md">
<div>
<h3 class="text-headline-md font-headline-md text-text-high-contrast">Dopamine</h3>
<p class="text-helper-text font-helper-text text-on-surface-variant uppercase mt-1">Inotrope / Vasopressor</p>
</div>
<div class="bg-surface-container text-nurse-primary p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="vaccines">vaccines</span>
</div>
</div>
<div class="w-full mt-auto pt-stack-sm border-t border-surface-variant">
<div class="flex justify-between items-end">
<span class="text-helper-text font-helper-text text-outline">Default Conc.</span>
<span class="text-label-bold font-label-bold text-on-surface">400 mg / 250 mL</span>
</div>
<div class="flex justify-between items-end mt-1">
<span class="text-helper-text font-helper-text text-outline">Typical Rate</span>
<span class="text-label-bold font-label-bold text-on-surface">2 - 20 mcg/kg/min</span>
</div>
</div>
</button>
<!-- Drug Card 2 -->
<button class="flex flex-col text-left bg-surface-container-lowest border-2 border-surface-variant hover:border-nurse-primary rounded-lg p-stack-md transition-all active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-nurse-primary focus:ring-offset-2 focus:ring-offset-background">
<div class="flex justify-between items-start w-full mb-stack-md">
<div>
<h3 class="text-headline-md font-headline-md text-text-high-contrast">Epinephrine</h3>
<p class="text-helper-text font-helper-text text-on-surface-variant uppercase mt-1">Vasopressor</p>
</div>
<div class="bg-surface-container text-nurse-primary p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="vaccines">vaccines</span>
</div>
</div>
<div class="w-full mt-auto pt-stack-sm border-t border-surface-variant">
<div class="flex justify-between items-end">
<span class="text-helper-text font-helper-text text-outline">Default Conc.</span>
<span class="text-label-bold font-label-bold text-on-surface">4 mg / 250 mL</span>
</div>
<div class="flex justify-between items-end mt-1">
<span class="text-helper-text font-helper-text text-outline">Typical Rate</span>
<span class="text-label-bold font-label-bold text-on-surface">0.01 - 0.1 mcg/kg/min</span>
</div>
</div>
</button>
<!-- Drug Card 3 -->
<button class="flex flex-col text-left bg-surface-container-lowest border-2 border-surface-variant hover:border-nurse-primary rounded-lg p-stack-md transition-all active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-nurse-primary focus:ring-offset-2 focus:ring-offset-background">
<div class="flex justify-between items-start w-full mb-stack-md">
<div>
<h3 class="text-headline-md font-headline-md text-text-high-contrast">Heparin</h3>
<p class="text-helper-text font-helper-text text-on-surface-variant uppercase mt-1">Anticoagulant</p>
</div>
<div class="bg-surface-container text-nurse-primary p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="vaccines">vaccines</span>
</div>
</div>
<div class="w-full mt-auto pt-stack-sm border-t border-surface-variant">
<div class="flex justify-between items-end">
<span class="text-helper-text font-helper-text text-outline">Default Conc.</span>
<span class="text-label-bold font-label-bold text-on-surface">25,000 units / 250 mL</span>
</div>
<div class="flex justify-between items-end mt-1">
<span class="text-helper-text font-helper-text text-outline">Typical Rate</span>
<span class="text-label-bold font-label-bold text-on-surface">Weight-based protocol</span>
</div>
</div>
</button>
<!-- Drug Card 4 -->
<button class="flex flex-col text-left bg-surface-container-lowest border-2 border-surface-variant hover:border-nurse-primary rounded-lg p-stack-md transition-all active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-nurse-primary focus:ring-offset-2 focus:ring-offset-background">
<div class="flex justify-between items-start w-full mb-stack-md">
<div>
<h3 class="text-headline-md font-headline-md text-text-high-contrast">Propofol</h3>
<p class="text-helper-text font-helper-text text-on-surface-variant uppercase mt-1">Sedative</p>
</div>
<div class="bg-surface-container text-nurse-primary p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="vaccines">vaccines</span>
</div>
</div>
<div class="w-full mt-auto pt-stack-sm border-t border-surface-variant">
<div class="flex justify-between items-end">
<span class="text-helper-text font-helper-text text-outline">Default Conc.</span>
<span class="text-label-bold font-label-bold text-on-surface">1,000 mg / 100 mL</span>
</div>
<div class="flex justify-between items-end mt-1">
<span class="text-helper-text font-helper-text text-outline">Typical Rate</span>
<span class="text-label-bold font-label-bold text-on-surface">5 - 50 mcg/kg/min</span>
</div>
</div>
</button>
<!-- Drug Card 5 -->
<button class="flex flex-col text-left bg-surface-container-lowest border-2 border-surface-variant hover:border-nurse-primary rounded-lg p-stack-md transition-all active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-nurse-primary focus:ring-offset-2 focus:ring-offset-background">
<div class="flex justify-between items-start w-full mb-stack-md">
<div>
<h3 class="text-headline-md font-headline-md text-text-high-contrast">Insulin Regular</h3>
<p class="text-helper-text font-helper-text text-on-surface-variant uppercase mt-1">Hormone</p>
</div>
<div class="bg-surface-container text-nurse-primary p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="vaccines">vaccines</span>
</div>
</div>
<div class="w-full mt-auto pt-stack-sm border-t border-surface-variant">
<div class="flex justify-between items-end">
<span class="text-helper-text font-helper-text text-outline">Default Conc.</span>
<span class="text-label-bold font-label-bold text-on-surface">100 units / 100 mL</span>
</div>
<div class="flex justify-between items-end mt-1">
<span class="text-helper-text font-helper-text text-outline">Typical Rate</span>
<span class="text-label-bold font-label-bold text-on-surface">1 - 10 units/hr</span>
</div>
</div>
</button>
<!-- Manual Entry / Basic Infusion -->
<button class="flex items-center justify-center col-span-1 md:col-span-2 bg-surface-container border-2 border-dashed border-outline-variant hover:border-nurse-primary hover:bg-surface-container-high rounded-lg p-stack-lg transition-all active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-nurse-primary focus:ring-offset-2 focus:ring-offset-background min-h-[120px]">
<div class="flex flex-col items-center text-center">
<span class="material-symbols-outlined text-nurse-primary mb-2 text-metric-lg" data-icon="add_circle">add_circle</span>
<span class="text-headline-md font-headline-md text-text-high-contrast">Basic Infusion (No Drug Selected)</span>
<span class="text-helper-text font-helper-text text-on-surface-variant mt-1">Configure rate and volume manually</span>
</div>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 h-20 pb-safe bg-white border-t-2 rounded-t-none border-slate-200 shadow-none md:hidden">
<a class="flex flex-col items-center justify-center text-slate-500 hover:bg-slate-50 p-2 min-w-touch-target-min min-h-touch-target-min rounded-DEFAULT transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="gas_meter">gas_meter</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">Pump</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 hover:bg-slate-50 p-2 min-w-touch-target-min min-h-touch-target-min rounded-DEFAULT transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="notifications">notifications</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">Alarms</span>
</a>
<a class="flex flex-col items-center justify-center bg-slate-100 text-[#00897B] rounded-md p-2 min-w-touch-target-min min-h-touch-target-min transition-all scale-95 duration-75" href="#">
<span class="material-symbols-outlined mb-1" data-icon="local_hospital" style="font-variation-settings: 'FILL' 1;">local_hospital</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">Drug Lib</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 hover:bg-slate-50 p-2 min-w-touch-target-min min-h-touch-target-min rounded-DEFAULT transition-colors" href="#">
<span class="material-symbols-outlined mb-1" data-icon="history">history</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">Logs</span>
</a>
</nav>
</body></html>
