<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Smart Infusion - Nurse Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined', sans-serif;
            font-size: 24px; /* Default size, override with utility classes if needed */
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#171d1b",
                        "surface-tint": "#006b5f",
                        "surface-container-high": "#e4e9e7",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#8a99fe",
                        "on-tertiary-fixed": "#071e27",
                        "on-secondary-fixed": "#000d5f",
                        "surface-container": "#eaefec",
                        "on-primary-container": "#f4fffb",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#00201c",
                        "secondary-fixed-dim": "#bbc3ff",
                        "on-surface": "#171d1b",
                        "primary-container": "#008376",
                        "surface-container-highest": "#dfe4e1",
                        "success-green": "#2E7D32",
                        "primary": "#00685d",
                        "doctor-primary": "#303F9F",
                        "surface-container-low": "#f0f5f2",
                        "surface-neutral": "#F5F5F5",
                        "tertiary": "#4a5f69",
                        "surface-bright": "#f6faf8",
                        "inverse-surface": "#2c3130",
                        "on-tertiary-container": "#fbfdff",
                        "on-primary": "#ffffff",
                        "surface": "#f6faf8",
                        "nurse-primary": "#00897B",
                        "on-tertiary": "#ffffff",
                        "critical-red": "#D32F2F",
                        "secondary": "#4755b6",
                        "text-high-contrast": "#212121",
                        "on-secondary-fixed-variant": "#2d3c9c",
                        "outline-variant": "#bcc9c5",
                        "surface-variant": "#dfe4e1",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#005048",
                        "error-container": "#ffdad6",
                        "admin-primary": "#455A64",
                        "background": "#f6faf8",
                        "hard-limit-bg": "#FFEBEE",
                        "on-secondary-container": "#1b2b8c",
                        "primary-fixed-dim": "#70d8c8",
                        "inverse-primary": "#70d8c8",
                        "outline": "#6d7a77",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#627882",
                        "on-surface-variant": "#3d4946",
                        "surface-dim": "#d6dbd9",
                        "inverse-on-surface": "#edf2ef",
                        "on-tertiary-fixed-variant": "#354a53",
                        "tertiary-fixed-dim": "#b4cad6",
                        "primary-fixed": "#8df5e4",
                        "soft-limit-bg": "#FFF8E1",
                        "tertiary-fixed": "#cfe6f2",
                        "secondary-fixed": "#dfe0ff",
                        "warning-amber": "#FFB300"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-edge": "20px",
                        "stack-sm": "8px",
                        "touch-target-min": "48px",
                        "stack-lg": "24px",
                        "stack-md": "16px",
                        "input-height": "56px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "metric-xl": ["Inter"],
                        "helper-text": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-bold": ["Inter"],
                        "body-lg": ["Inter"],
                        "metric-lg": ["Inter"]
                    },
                    "fontSize": {
                        "metric-xl": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "helper-text": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-bold": ["14px", { "lineHeight": "20px", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "metric-lg": ["32px", { "lineHeight": "40px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-lg text-body-lg antialiased selection:bg-secondary selection:text-on-secondary relative">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-5 h-16 bg-slate-50 dark:bg-slate-950 border-b-2 border-slate-200 dark:border-slate-800">
<div class="text-lg font-black text-slate-900 dark:text-slate-100 flex items-center gap-2">
<span class="material-symbols-outlined text-[#00897B] dark:text-[#26A69A]" style="font-variation-settings: 'FILL' 1;">medical_services</span>
<span class="font-['Inter'] font-bold tracking-tighter text-sm uppercase text-[#00897B] dark:text-[#26A69A]">SMART INFUSION</span>
</div>
<div class="flex items-center gap-stack-md">
<!-- Role Badge -->
<span class="bg-secondary text-on-secondary px-2 py-1 rounded font-label-bold text-label-bold">NURSE</span>
<!-- Battery Status -->
<div class="flex items-center text-warning-amber bg-soft-limit-bg px-2 py-1 rounded border border-warning-amber/30">
<span class="material-symbols-outlined text-[18px]">battery_2_bar</span>
<span class="font-label-bold text-label-bold text-text-high-contrast ml-1">18%</span>
</div>
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors cursor-pointer rounded-full p-1">logout</span>
</div>
</header>
<!-- Main Canvas -->
<main class="pt-[80px] pb-[180px] px-margin-edge flex flex-col gap-stack-md max-w-2xl mx-auto">
<!-- Status Banner -->
<div class="bg-secondary text-on-secondary rounded-xl p-stack-md flex justify-between items-center shadow-sm relative overflow-hidden">
<div class="absolute inset-0 opacity-10 bg-[linear-gradient(45deg,transparent_25%,rgba(255,255,255,0.2)_50%,transparent_75%)] bg-[length:20px_20px]"></div>
<div class="flex items-center gap-stack-sm relative z-10">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">vital_signs</span>
<span class="font-headline-md text-headline-md tracking-wide">RUNNING</span>
</div>
<!-- Pulsing Indicator -->
<div class="flex items-center gap-2 relative z-10 bg-on-secondary/20 px-3 py-1 rounded-full">
<div class="w-2.5 h-2.5 bg-primary-fixed rounded-full animate-pulse shadow-[0_0_8px_rgba(141,245,228,0.8)]"></div>
<span class="font-label-bold text-label-bold text-on-secondary text-[12px] uppercase tracking-wider">Infusing</span>
</div>
</div>
<!-- Primary Rate Display (Bento Style) -->
<div class="bg-surface rounded-xl border border-outline-variant p-stack-lg flex flex-col items-center justify-center relative shadow-sm">
<div class="absolute top-stack-sm left-stack-sm text-outline">
<span class="material-symbols-outlined text-[20px]">water_drop</span>
</div>
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-widest mb-2">Current Rate</span>
<div class="flex items-baseline gap-stack-sm">
<span class="font-metric-xl text-metric-xl text-on-surface tracking-tight">15.0</span>
<span class="font-headline-md text-headline-md text-tertiary">mL/hr</span>
</div>
</div>
<!-- Progress & Volume Metrics -->
<div class="bg-surface rounded-xl border border-outline-variant p-stack-lg flex flex-col gap-stack-lg shadow-sm">
<!-- Volume Data Points -->
<div class="flex justify-between items-end">
<div class="flex flex-col">
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider mb-1">Vol Infused</span>
<div class="flex items-baseline gap-1">
<span class="font-metric-lg text-metric-lg text-secondary">45.2</span>
<span class="font-body-lg text-body-lg text-tertiary font-medium">mL</span>
</div>
</div>
<div class="flex flex-col items-end">
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider mb-1">Remaining</span>
<div class="flex items-baseline gap-1">
<span class="font-headline-md text-headline-md text-on-surface">104.8</span>
<span class="font-body-lg text-body-lg text-tertiary font-medium">mL</span>
</div>
</div>
</div>
<!-- VTBI Progress Bar -->
<div class="relative w-full pt-2">
<div class="flex justify-between mb-1">
<span class="font-helper-text text-helper-text text-tertiary">0 mL</span>
<span class="font-helper-text text-helper-text text-tertiary">150 mL (VTBI)</span>
</div>
<div class="w-full h-4 bg-surface-container-high rounded-full overflow-hidden shadow-inner">
<!-- Progress bar fill (~30%) -->
<div class="h-full bg-secondary w-[30%] relative">
<!-- Striped pattern for active state texture -->
<div class="absolute inset-0 opacity-20 bg-[linear-gradient(45deg,rgba(255,255,255,0.4)_25%,transparent_25%,transparent_50%,rgba(255,255,255,0.4)_50%,rgba(255,255,255,0.4)_75%,transparent_75%,transparent)] bg-[length:1rem_1rem]"></div>
</div>
</div>
</div>
<!-- Time Remaining Divider -->
<div class="flex justify-between items-center pt-stack-md border-t border-surface-variant">
<span class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider">Time Remaining</span>
<div class="flex items-center gap-stack-sm bg-surface-container-lowest px-3 py-2 rounded-lg border border-outline-variant">
<span class="material-symbols-outlined text-secondary">timer</span>
<span class="font-headline-md text-headline-md text-on-surface tabular-nums tracking-tight">02:15:00</span>
</div>
</div>
</div>
<!-- Operation Controls -->
<div class="grid grid-cols-3 gap-gutter pt-stack-sm">
<!-- Start (Disabled) -->
<button class="min-h-[72px] flex flex-col items-center justify-center bg-surface-container-highest text-outline rounded-xl border border-surface-variant opacity-50 cursor-not-allowed" disabled="">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<span class="font-label-bold text-label-bold mt-1">START</span>
</button>
<!-- Pause (Amber Warning State) -->
<button class="min-h-[72px] flex flex-col items-center justify-center bg-warning-amber text-text-high-contrast rounded-xl border-2 border-warning-amber shadow-[0_4px_12px_rgba(255,179,0,0.3)] hover:brightness-95 active:scale-95 transition-all">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">pause</span>
<span class="font-label-bold text-label-bold mt-1 text-on-background">PAUSE</span>
</button>
<!-- Stop (Neutral/Grey) -->
<button class="min-h-[72px] flex flex-col items-center justify-center bg-surface-container text-on-surface rounded-xl border border-outline shadow-sm hover:bg-surface-variant active:scale-95 transition-all">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">stop</span>
<span class="font-label-bold text-label-bold mt-1">STOP</span>
</button>
</div>
</main>
<!-- Emergency Stop Overlay Layer -->
<div class="fixed bottom-[96px] left-0 w-full px-margin-edge z-40 max-w-2xl mx-auto right-0">
<button class="w-full min-h-[64px] bg-critical-red text-on-error rounded-xl font-headline-md text-headline-md flex items-center justify-center gap-stack-md shadow-[0_8px_24px_rgba(211,47,47,0.4)] border-2 border-on-error/20 active:scale-[0.98] transition-transform relative overflow-hidden group">
<!-- Animated fill background for "Hold 2s" visual cue (CSS only placeholder) -->
<div class="absolute inset-y-0 left-0 bg-on-error/20 w-0 group-active:w-full transition-all duration-[2000ms] ease-linear"></div>
<span class="material-symbols-outlined relative z-10" style="font-variation-settings: 'FILL' 1;">warning</span>
<span class="relative z-10 tracking-wide">EMERGENCY STOP <span class="font-label-bold text-[14px] opacity-80">(Hold 2s)</span></span>
</button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 h-20 bg-white dark:bg-slate-900 border-t-2 border-slate-200 dark:border-slate-800 pb-safe shadow-[0_-4px_16px_rgba(0,0,0,0.05)]">
<!-- Active Tab: Pump -->
<a class="flex flex-col items-center justify-center bg-slate-100 dark:bg-slate-800 text-[#00897B] dark:text-[#26A69A] rounded-md p-2 min-w-[64px] scale-95 duration-75" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">gas_meter</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">Pump</span>
</a>
<!-- Inactive Tab: Alarms -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-2 min-w-[64px] hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors" href="#">
<span class="material-symbols-outlined mb-1">notifications</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">Alarms</span>
</a>
<!-- Inactive Tab: Drug Lib -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-2 min-w-[64px] hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors" href="#">
<span class="material-symbols-outlined mb-1">local_hospital</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">Drug Lib</span>
</a>
<!-- Inactive Tab: Logs -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 p-2 min-w-[64px] hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors" href="#">
<span class="material-symbols-outlined mb-1">history</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest">Logs</span>
</a>
</nav>
</body></html>
